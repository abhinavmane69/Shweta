    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOGUE: Shweta's Birthday Edition 🌷</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            background: radial-gradient(circle at center, #1a1a1a, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* START OVERLAY (To enable music) */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .start-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #ff4d6d;
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px #ff4d6d;
        }

        /* BOOK STYLING */
        .book {
            width: 900px;
            height: 560px;
            position: relative;
            perspective: 2500px;
            animation: openBook 1.8s ease forwards;
            display: none; /* Hidden until start clicked */
        }

        @keyframes openBook {
            0% { transform: scale(0.6) rotateX(20deg); opacity: 0; }
            100% { transform: scale(1) rotateX(0deg); opacity: 1; }
        }

        .page {
            width: 450px;
            height: 100%;
            position: absolute;
            right: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(.645, .045, .355, 1);
            z-index: 5;
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: white;
            border-radius: 0 15px 15px 0;
            box-shadow: inset 3px 0 10px rgba(0,0,0,0.1), 0 15px 40px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .back { transform: rotateY(180deg); background:#fff5f7; border-radius: 15px 0 0 15px; }

        input { display:none; }
        #p1:checked ~ .p1 { transform: rotateY(-180deg); z-index:10; }
        #p2:checked ~ .p2 { transform: rotateY(-180deg); z-index:11; }
        #p3:checked ~ .p3 { transform: rotateY(-180deg); z-index:12; }

        .content { padding:30px; text-align:center; height: 100%; box-sizing: border-box; }

        .vogue-logo { font-size:72px; font-family:'Playfair Display'; margin: 10px 0; }
        .tagline { letter-spacing:5px; font-size:12px; opacity:0.7; }

        /* IMAGE STYLING */
        .img-box img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .layout-bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .layout-bottom-grid img { height: 120px; }

        /* SLIDESHOW */
        .slideshow { position: relative; height: 220px; width: 100%; }
        .slideshow img {
            position: absolute;
            top: 0; left: 0;
            display: none;
        }
        .slideshow img.active { display: block; }

        .quote { font-family:'Dancing Script'; color:#ff4d6d; font-size:1.6rem; margin-top: 15px; }
        .shayari { font-family:'Dancing Script'; font-size:1.5rem; line-height:1.6; color: #333; margin-top: 20px; }

        /* DECORATION */
        .tulip {
            position: fixed;
            bottom: -50px;
            font-size: 24px;
            z-index: 3000;
            animation: floatUp 5s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity:1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity:0; }
        }

        #typingText { font-size: 1.1rem; line-height: 1.8; color: #444; font-weight: 600; white-space: pre-line; }

    </style>
</head>
<body>

<div id="overlay">
    <div class="vogue-logo" style="color:white">VOGUE</div>
    <p>Shweta's Birthday Edition</p>
    <button class="start-btn" onclick="startExperience()">Open Magazine 🌷</button>
</div>

<audio id="music" loop>
    <source src="Manchala Hasee Toh Phasee 128 Kbps.mp3" type="audio/mpeg">
</audio>

<div class="book" id="mainBook">
    
    <input type="checkbox" id="p1">
    <div class="page p1">
        <label class="front" for="p1" style="background:black;color:white;">
            <div class="content">
                <div class="tagline">HAPPY BIRTHDAY</div>
                <div class="vogue-logo">VOGUE</div>
                <div class="img-box"><img src="IMG-20260310-WA0121.jpg" alt="Shweta"></div>
                <h2 style="margin-top:20px;">Shweta 💖</h2>
                <p>Click to open</p>
            </div>
        </label>
        <label class="back" for="p1">
            <div class="content">
                <h2>Our Story 🌷</h2>
                <div class="img-box">
                    <img src="IMG-20260310-WA0136.jpg">
                </div>
                <p class="quote">"Not perfect memories, but perfect together."</p>
            </div>
        </label>
    </div>

    <input type="checkbox" id="p2">
    <div class="page p2">
        <label class="front" for="p2">
            <div class="content">
                <h2>Tom & Jerry 💫</h2>
                <div class="slideshow">
                    <img src="IMG-20260311-WA0089.jpg" class="active">
                    <img src="IMG-20260311-WA0147.jpg">
                    <img src="IMG 20260319_142406_921.jpg">
                </div>
                <p style="margin-top:20px;">Fights unlimited, bond unbreakable 😌</p>
            </div>
        </label>
        <label class="back" for="p2">
            <div class="content">
                <h2>Shayari 🌸</h2>
                <div class="shayari">
                    Tu hasi toh lagta hai duniya meri jeet gayi,<br>
                    Tu rooth jaaye toh lagta hai sab kuch haar gaya... 💔<br><br>
                    Par sach ye hai bandriya 😌,<br>
                    Tu saath ho toh har din festival lagta hai. 🌷
                </div>
            </div>
        </label>
    </div>

    <input type="checkbox" id="p3">
    <div class="page p3">
        <label class="front" for="p3">
            <div class="content">
                <h2>Savage Queen 🐒</h2>
                <div class="layout-bottom-grid">
                    <img src="MVIMG 20260221_124155.jpg">
                    <img src="MVIMG 20260311_101952.jpg">
                    <img src="MVIMG 20260311_111947.jpg">
                    <img src="MVIMG 20260318_085241.jpg">
                </div>
                <p class="quote">"Attitude level: Shweta 🔥"</p>
            </div>
        </label>
        <label class="back" for="p3">
            <div class="content">
                <h2>Final Message 💌</h2>
                <div id="typingText"></div>
            </div>
        </label>
    </div>
</div>

<script>
function startExperience() {
    document.getElementById("overlay").style.display = "none";
    document.getElementById("mainBook").style.display = "block";
    let music = document.getElementById("music");
    music.play().catch(e => console.log("Audio play failed, click again"));
    
    // Start Tulips
    setInterval(createTulip, 800);
}

function createTulip(){
    let tulip = document.createElement("div");
    tulip.className = "tulip";
    tulip.innerHTML = "🌷";
    tulip.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(tulip);
    setTimeout(() => tulip.remove(), 5000);
}

// Typing animation
const message = `No matter kitna bhi fight ho...
Tu meri permanent person hai 😌❤️

Stay same — cute, caring & thodi si pagal 😜✨

Happy Birthday Shweta 🎂🌷`;

let i = 0;
function typeEffect(){
    const el = document.getElementById("typingText");
    if(!el) return;
    if(i < message.length){
        el.innerHTML += message.charAt(i);
        i++;
        setTimeout(typeEffect, 500 / 10);
    }
}

// Trigger typing when last page is flipped
const p3 = document.getElementById("p3");
p3.addEventListener("change", () => {
    if(p3.checked){
        document.getElementById("typingText").innerHTML = "";
        i = 0;
        setTimeout(typeEffect, 1000);
    }
});

// Slideshow logic
setInterval(() => {
    let slides = document.querySelectorAll('.slideshow img');
    if(slides.length === 0) return;
    let index = Array.from(slides).findIndex(img => img.classList.contains('active'));
    slides[index].classList.remove('active');
    slides[(index + 1) % slides.length].classList.add('active');
}, 2500);

</script>
</body>
</html>

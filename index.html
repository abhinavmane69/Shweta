<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shweta ❤️ Birthday Magazine</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin:0; background:#000; font-family:'Poppins',sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow:hidden;
        }

        #book { box-shadow: 0 0 50px rgba(255, 77, 109, 0.3); }

        .page {
            background:#111; color:white; display:flex;
            flex-direction:column; justify-content:center;
            align-items:center; border: 1px solid #222;
            padding: 20px; box-sizing: border-box;
        }

        .page img {
            width:85%; height:60%; object-fit:cover;
            border-radius:15px; box-shadow:0 0 20px rgba(255,255,255,0.1);
        }

        .text {
            margin-top:20px; font-size:16px; text-align:center;
            width:85%; min-height:60px; color:#ffd6de;
            background:rgba(0,0,0,0.6); padding:10px;
            border-radius:10px; line-height: 1.5;
            border-right: 2px solid #ff4d6d;
            word-wrap: break-word; /* Prevents text from cutting off */
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .last { background: linear-gradient(135deg, #111, #330a12); text-align:center; }
    </style>
</head>

<body>

<audio id="song" loop preload="auto">
    <source src="Manchala Hasee Toh Phasee 128.mp3" type="audio/mp3">
</audio>

<div id="book">
    <div class="page" data-density="hard">
        <video autoplay muted loop playsinline style="position:absolute; width:100%; height:100%; object-fit:cover; z-index:-2;">
            <source src="abhinav._.299_14041229_175248310.mp4" type="video/mp4">
        </video>
        <div style="position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:-1;"></div>
        
        <div style="text-align:center; z-index:1; padding:25px; backdrop-filter: blur(8px); border-radius:20px; border: 1px solid rgba(255,255,255,0.1);">
            <h1 style="font-size:42px; color:#ff4d6d; margin:0;">✨ Shweta ✨</h1>
            <p style="color:#ffd6de;">The Special One ❤️</p>
            <p style="margin-top:20px;">"Kuch log zindagi mein bas aate nahi...<br>woh zindagi ban jaate hai 💖"</p>
            <p style="margin-top:30px; font-size:12px; animation:pulse 2s infinite;">TAP ANYWHERE TO START ➡️</p>
        </div>
    </div>

    <div class="page"><img src="IMG-20260310-WA0121.jpg"><div class="text" data-text="Kabhi hasi, kabhi ladai... par har pal tere saath hi achha lagta hai ❤️"></div></div>
    <div class="page"><img src="IMG-20260310-WA0136.jpg"><div class="text" data-text="Tu irritate karti hai... par sach kahu toh woh bhi pyara lagta hai 😄"></div></div>
    <div class="page"><img src="IMG-20260311-WA0089.jpg"><div class="text" data-text="Bilkul Judy aur Nick jaisi hai apni story 🐰🦊"></div></div>
    <div class="page"><img src="IMG-20260311-WA0147.jpg"><div class="text" data-text="Ladte bhi hai... par care bhi utni hi karte hai 💖"></div></div>
    <div class="page"><img src="IMG_20260319_142406_921.jpg"><div class="text" data-text="Tu hasi toh duniya thodi aur beautiful lagne lagti hai 🌸"></div></div>
    <div class="page"><img src="MVIMG_20260221_124155.jpg"><div class="text" data-text="Har yaad tere saath... ek alag hi feeling deti hai ✨"></div></div>
    <div class="page"><img src="MVIMG_20260311_101952.jpg"><div class="text" data-text="Tu special hai... aur hamesha rahegi 💫"></div></div>
    <div class="page"><img src="MVIMG_20260311_111947.jpg"><div class="text" data-text="Kabhi kabhi sochta hu... tu meri life mein kaise aa gayi ❤️"></div></div>
    <div class="page"><img src="MVIMG_20260318_085241.jpg"><div class="text" data-text="Par jo bhi hai... best hai 💯"></div></div>
    <div class="page"><img src="Snapchat-1312202217.jpg"><div class="text" data-text="Tu sirf dost nahi... ek emotion hai 🫶"></div></div>

    <div class="page last" data-density="hard">
        <h2 style="color:#ff4d6d;">🎂 Happy Birthday Shweta!</h2>
        <p style="font-size:15px; line-height:1.7;">
            "Na tu sirf dost hai, Na sirf ek aadat,<br>
            Tu woh feeling hai, Jo har din ko bana deti hai khaas 💖"
        </p>
        <p style="margin-top:20px; font-weight:bold; color:#ffd6de;">✨ Always Stay Happy ✨</p>
    </div>
</div>

<script>
    const music = document.getElementById('song');

    // 1. Initialize Page Flip
    const pageFlip = new St.PageFlip(document.getElementById("book"), {
        width: 400, height: 600, size: "stretch", showCover: true
    });
    pageFlip.loadFromHTML(document.querySelectorAll(".page"));

    // 2. Fix Music & Loop (Triggers on first interaction)
    function playMusic() {
        music.play().catch(e => console.log("Playback failed:", e));
        music.loop = true; // Hard-coded loop
        document.removeEventListener('click', playMusic);
        document.removeEventListener('touchstart', playMusic);
    }
    document.addEventListener('click', playMusic);
    document.addEventListener('touchstart', playMusic);

    // 3. Animation Logic: Trigger Typing when page turns
    pageFlip.on('flip', (e) => {
        const pages = document.querySelectorAll('.page');
        const currentPage = pages[e.data];
        const textEl = currentPage.querySelector('.text');

        if (textEl && !textEl.getAttribute('data-done')) {
            startTyping(textEl);
        }

        // Confetti on Last Page
        if (e.data === pageFlip.getPageCount() - 1) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    });

    function startTyping(el) {
        const fullText = el.getAttribute('data-text');
        el.innerHTML = "";
        el.setAttribute('data-done', 'true');
        let i = 0;
        const speed = 60;

        function type() {
            if (i < fullText.length) {
                el.innerHTML += fullText.charAt(i);
                i++;
                setTimeout(type, speed);
            } else {
                el.style.borderRight = "none";
            }
        }
        type();
    }

    // Start typing for page 1 manually
    setTimeout(() => {
        const firstText = document.querySelectorAll('.text');
        if(firstText) startTyping(firstText);
    }, 1500);
</script>

</body>
</html>

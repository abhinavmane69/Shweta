<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shweta ❤️ Birthday Magazine</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<!-- Page Flip Library -->
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>
body {
    margin:0;
    background:#000;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

#book {
    width:90vw;
    height:90vh;
    margin:auto;
}

.page {
    background:#111;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
}

.page img {
    width:80%;
    height:60%;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.text {
    margin-top:20px;
    font-size:18px;
    text-align:center;
    width:80%;
    min-height:60px;
    border-right:2px solid white;
    white-space:nowrap;
    overflow:hidden;
}

/* Glow effect */
.page::before {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle,rgba(255,77,109,0.3),transparent);
    z-index:-1;
}

/* Last Page */
.last {
    font-size:22px;
    padding:20px;
    text-align:center;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio autoplay loop>
    <source src="Manchala Hasee Toh Phasee 128.mp3" type="audio/mp3">
</audio>

<div id="book">

<!-- PAGE 1 -->
<div class="page">
<img src="IMG-20260310-WA0121.jpg">
<div class="text" data-text="Kabhi hasi, kabhi ladai... par har pal tere saath hi achha lagta hai ❤️"></div>
</div>

<!-- PAGE 2 -->
<div class="page">
<img src="IMG-20260310-WA0136.jpg">
<div class="text" data-text="Tu irritate karti hai... par sach kahu toh woh bhi pyara lagta hai 😄"></div>
</div>

<!-- PAGE 3 -->
<div class="page">
<img src="IMG-20260311-WA0089.jpg">
<div class="text" data-text="Bilkul Judy aur Nick jaisi hai apni story 🐰🦊"></div>
</div>

<!-- PAGE 4 -->
<div class="page">
<img src="IMG-20260311-WA0147.jpg">
<div class="text" data-text="Ladte bhi hai... par care bhi utni hi karte hai 💖"></div>
</div>

<!-- PAGE 5 -->
<div class="page">
<img src="IMG_20260319_142406_921.jpg">
<div class="text" data-text="Tu hasi toh duniya thodi aur beautiful lagne lagti hai 🌸"></div>
</div>

<!-- PAGE 6 -->
<div class="page">
<img src="MVIMG_20260221_124155.jpg">
<div class="text" data-text="Har yaad tere saath... ek alag hi feeling deti hai ✨"></div>
</div>

<!-- PAGE 7 -->
<div class="page">
<img src="MVIMG_20260311_101952.jpg">
<div class="text" data-text="Tu special hai... aur hamesha rahegi 💫"></div>
</div>

<!-- PAGE 8 -->
<div class="page">
<img src="MVIMG_20260311_111947.jpg">
<div class="text" data-text="Kabhi kabhi sochta hu... tu meri life mein kaise aa gayi ❤️"></div>
</div>

<!-- PAGE 9 -->
<div class="page">
<img src="MVIMG_20260318_085241.jpg">
<div class="text" data-text="Par jo bhi hai... best hai 💯"></div>
</div>

<!-- PAGE 10 -->

<img src="Snapchat-1312202217.jpg">

<!-- FINAL PAGE -->
<div class="page last">
🎂 Happy Birthday Shweta 🎂<br><br>

"Na tu sirf dost hai,<br>
Na sirf ek aadat,<br>
Tu woh feeling hai,<br>
Jo har din ko bana deti hai khaas 💖<br><br>

Judi aur Nick jaisi apni kahani,<br>
Kabhi ladai, kabhi hasi purani,<br>
Par sach yeh hai Shweta,<br>
Tu meri life ki sabse beautiful kahani ❤️"<br><br>

✨ Always Stay Happy ✨
</div>

</div>

<script>
const pageFlip = new St.PageFlip(
    document.getElementById("book"),
    {
        width: 400,
        height: 600,
        size: "stretch",
        minWidth: 300,
        maxWidth: 800,
        minHeight: 400,
        maxHeight: 1000,
        showCover: true,
        mobileScrollSupport: false
    }
);

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

/* Typing Animation */
document.querySelectorAll('.text').forEach(el => {
    let text = el.getAttribute('data-text');
    let i = 0;
    function type() {
        if(i < text.length){
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 40);
        }
    }
    type();
});
</script>

</body>
</html>
